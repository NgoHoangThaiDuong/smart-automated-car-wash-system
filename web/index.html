<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Car Wash Redirect</title>
    <script>
        // Redirect to dashboard or login based on session status check
        fetch('api/profile')
        .then(res => {
            if (res.status === 401) {
                window.location.href = 'login.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        })
        .catch(() => {
            window.location.href = 'login.html';
        });
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
